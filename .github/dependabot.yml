version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # Group ALL updates (incl. majors) so we get one PR per dep type, not
    # one PR per package. Majors still need a manual review of the
    # changelog before merging — that's expected.
    groups:
      runtime:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - patch
          - minor
          - major
      dev:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - patch
          - minor
          - major
      security:
        applies-to: security-updates
        patterns:
          - "*"
    # Skip noise from peer/transitive ranges that overrides already pin.
    ignore:
      - dependency-name: dompurify
      - dependency-name: nanoid
      - dependency-name: uuid
      - dependency-name: esbuild
      - dependency-name: lodash-es
      - dependency-name: serialize-javascript

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        applies-to: version-updates
        patterns:
          - "*"
